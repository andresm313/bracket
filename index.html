    input[type=file]::file-selector-button{background:#C9A227;color:#111;font-weight:700;border:0;padding:.4rem .9rem;border-radius:.5rem;cursor:pointer;margin-right:.75rem;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function combinations(arr,k){
  if(k>arr.length||k<=0)return[];
  if(k===arr.length)return[[...arr]];
  if(k===1)return arr.map(el=>[el]);
  const r=[];
  for(let i=0;i<=arr.length-k;i++) combinations(arr.slice(i+1),k-1).forEach(c=>r.push([arr[i],...c]));
  return r;
}
function uid(){return Math.random().toString(36).slice(2,10);}
const save=(k,v)=>{try{localStorage.setItem('cp_'+k,JSON.stringify(v));}catch(_){}};
const load=(k,fb)=>{try{const s=localStorage.getItem('cp_'+k);return s?JSON.parse(s):fb;}catch(_){return fb;}};

/* VALIDATION
   Age gap rules (experience-dependent):
     - Beginners (any group containing one): max 2 years gap
     - Intermediate + Advanced mix: max 4 years gap
     - Pure Intermediate or pure Advanced: max 3 years gap
   Hard rules (never break):
     - Weight spread ≤ 10 lbs
     - Advanced NEVER with Beginners
     - Beginners + Intermediates only as exactly 2+2 in a group of 4 (rare last resort)
*/
function validateGroup(wrestlers){
  const errors=[];
  if(wrestlers.length<2)return errors;
  const wts=wrestlers.map(w=>w.weight),ages=wrestlers.map(w=>w.age);
  const maxW=Math.max(...wts),minW=Math.min(...wts),maxA=Math.max(...ages),minA=Math.min(...ages);

  const hasB=wrestlers.some(w=>w.experience==='Beginner');
  const hasA=wrestlers.some(w=>w.experience==='Advanced');
  const hasI=wrestlers.some(w=>w.experience==='Intermediate');

  if(maxW-minW>10)
    errors.push(`Weight spread ${minW}–${maxW} lbs exceeds 10 lb limit`);

  // Age gap limit depends on experience mix
  const ageLimit = hasB ? 2 : (hasI && hasA) ? 4 : 3;
  if(maxA-minA>ageLimit)
    errors.push(`Age gap ${minA}–${maxA} years exceeds ${ageLimit}-year limit (${hasB?'Beginner groups: max 2 yrs':hasI&&hasA?'Intermediate+Advanced: max 4 yrs':'same-level: max 3 yrs'})`);

  // Hard rule: Advanced never with Beginners
  if(hasB&&hasA)
    errors.push('Advanced wrestlers cannot be grouped with Beginners');

  // Hard rule: Beginners + Intermediates only allowed as exactly 2+2 in a group of 4
  if(hasB&&hasI){
    const B=wrestlers.filter(w=>w.experience==='Beginner').length;
    const I=wrestlers.filter(w=>w.experience==='Intermediate').length;
    if(!(B===2&&I===2&&wrestlers.length===4))
      errors.push('Beginners & Intermediates can only mix as a 2+2 group of 4 (last resort only)');
  }

  if(wrestlers.length>4)
    errors.push('Groups cannot have more than 4 wrestlers');

  return errors;
}
function isValid(w){return validateGroup(w).length===0;}
function isPure(w){return new Set(w.map(x=>x.experience)).size===1;}
function hasBeginners(w){return w.some(x=>x.experience==='Beginner');}
function hasAdvanced(w){return w.some(x=>x.experience==='Advanced');}
function hasIntermediates(w){return w.some(x=>x.experience==='Intermediate');}

/* GROUPING
   Priority order:
   1.  Pure Advanced group of 4
   2.  Pure Advanced group of 3
   3.  Pure Intermediate group of 4
   4.  Pure Intermediate group of 3
   5.  Pure Beginner group of 4
   6.  Pure Beginner group of 3
   7.  Intermediate + Advanced mix of 4   (fallback — no beginners)
   8.  Intermediate + Advanced mix of 3   (fallback — no beginners)
   9.  Beginner + Intermediate 2+2 of 4   (rare last resort)
   10. Pure group of 2
   11. Any valid group of 2               (absolute last resort)
*/
function generateGroups(wrestlers){
  const sorted=[...wrestlers].sort((a,b)=>a.weight-b.weight);
  const remaining=[...sorted];
  const groups=[],unassigned=[];
  while(remaining.length>0){
    const anchor=remaining[0];
    const cands=remaining.filter(w=>w.weight-anchor.weight<=10);
    let group=null;
    const trySize=(sz,filter)=>{
      if(group||cands.length<sz)return;
      for(const c of combinations(cands,sz)){if(isValid(c)&&(!filter||filter(c))){group=c;return;}}
    };
    // 1-6: Pure groups, by experience tier, largest first
    trySize(4,c=>isPure(c)&&hasAdvanced(c));
    trySize(3,c=>isPure(c)&&hasAdvanced(c));
    trySize(4,c=>isPure(c)&&hasIntermediates(c)&&!hasAdvanced(c));
    trySize(3,c=>isPure(c)&&hasIntermediates(c)&&!hasAdvanced(c));
    trySize(4,c=>isPure(c)&&hasBeginners(c));
    trySize(3,c=>isPure(c)&&hasBeginners(c));
    // 7-8: I+A mix (no beginners)
    trySize(4,c=>!isPure(c)&&!hasBeginners(c));
    trySize(3,c=>!isPure(c)&&!hasBeginners(c));
    // 9: 2B+2I — rare, already enforced by isValid
    trySize(4,c=>!isPure(c));
    // 10-11: groups of 2
    trySize(2,isPure);
    trySize(2,null);
    if(group){
      groups.push({id:uid(),label:'',wrestlers:group});
      group.forEach(w=>remaining.splice(remaining.findIndex(r=>r.id===w.id),1));
    } else {unassigned.push(anchor);remaining.shift();}
  }
  groups.forEach((g,i)=>{g.label=String.fromCharCode(65+i);});
  return{groups,unassigned};
}

/* SCHEDULING */
function buildMatches(group){
  const w=group.wrestlers,n=w.length,raw=[];
  if(n===2){raw.push({round:1,w1:w[0],w2:w[1]});}
  else if(n===3){raw.push({round:1,w1:w[0],w2:w[1]});raw.push({round:2,w1:w[0],w2:w[2]});raw.push({round:3,w1:w[1],w2:w[2]});}
  else if(n===4){raw.push({round:1,w1:w[0],w2:w[3]});raw.push({round:1,w1:w[1],w2:w[2]});raw.push({round:2,w1:w[0],w2:w[1]});raw.push({round:2,w1:w[2],w2:w[3]});raw.push({round:3,w1:w[0],w2:w[2]});raw.push({round:3,w1:w[1],w2:w[3]});}
  return raw.map(m=>({...m,id:uid(),groupId:group.id,groupLabel:group.label,winner:null,winType:null,mat:1}));
}
function generateSchedule(groups,numMats){
  // How many matches each group produces
  const matchCount=g=>g.wrestlers.length===2?1:g.wrestlers.length===3?3:6;

  // Greedy balancing: assign largest groups first, always to the mat with fewest matches
  const matLoads=Array.from({length:numMats},(_,i)=>({mat:i+1,total:0}));
  const assign={};
  const sorted=[...groups].sort((a,b)=>matchCount(b)-matchCount(a));
  sorted.forEach(g=>{
    const lightest=matLoads.reduce((min,m)=>m.total<min.total?m:min);
    assign[g.id]=lightest.mat;
    lightest.total+=matchCount(g);
  });

  const matches=[];
  groups.forEach(g=>buildMatches(g).forEach(m=>matches.push({...m,mat:assign[g.id]})));
  return matches;
}

/* STANDINGS */
function computeStandings(group,matches){
  const rows=group.wrestlers.map(w=>({wrestler:w,wins:0,losses:0,pins:0,points:0}));
  matches.filter(m=>m.groupId===group.id&&m.winner).forEach(m=>{
    const loserId=m.winner===m.w1.id?m.w2.id:m.w1.id;
    const win=rows.find(r=>r.wrestler.id===m.winner);
    const los=rows.find(r=>r.wrestler.id===loserId);
    if(win){win.wins++;win.points+=m.winType==='pin'?6:4;if(m.winType==='pin')win.pins++;}
    if(los)los.losses++;
  });
  rows.sort((a,b)=>b.points-a.points||b.wins-a.wins||b.pins-a.pins);
  return rows;
}

/* CSV */
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,''));
  return lines.slice(1).map((line,i)=>{
    const vals=line.split(',').map(v=>v.trim());
    const obj={};
    headers.forEach((h,j)=>{obj[h]=vals[j]||'';});
    return{id:uid(),name:obj.name||`Wrestler ${i+1}`,age:parseFloat(obj.age)||14,grade:obj.grade||'',experience:['Beginner','Intermediate','Advanced'].includes(obj.experience)?obj.experience:'Beginner',weight:parseFloat(obj.weight)||130};
  }).filter(w=>w.name&&w.weight>0);
}

function Badge({text}){
  const cls=text==='Beginner'?'badge-b':text==='Intermediate'?'badge-i':'badge-a';
  return <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${cls}`}>{text?text[0]:'?'}</span>;
}

/* NAV */
function Nav({page,setPage,wrestlers,groups}){
  const tabs=[{id:'upload',icon:'①',label:'Upload',badge:wrestlers.length||null},{id:'groups',icon:'②',label:'Groups',badge:groups.length||null},{id:'schedule',icon:'③',label:'Schedule',badge:null},{id:'results',icon:'④',label:'Results',badge:null},{id:'standings',icon:'⑤',label:'Standings',badge:null},
    {id:'reset',icon:'⑥',label:'Reset',badge:null}];
  return(
    <nav className="cp-nav shadow-xl sticky top-0 z-50">
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-1 flex-wrap">
        <div className="font-bold cp-gold-text text-base mr-4 whitespace-nowrap tracking-widest">🐾 CLUB PAW</div>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setPage(t.id)} className={`relative px-3 py-1.5 rounded-lg text-sm transition-all ${page===t.id?'cp-nav-active':'cp-nav-inactive'}`}>
            {t.icon} {t.label}
            {t.badge?<span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">{t.badge>99?'99+':t.badge}</span>:null}
          </button>
        ))}
      </div>
    </nav>
  );
}

/* PAGE 1 — UPLOAD */
function UploadPage({wrestlers,setWrestlers}){
  const [paste,setPaste]=useState('');
  const [err,setErr]=useState('');
  const [editId,setEditId]=useState(null);
  function imp(text){try{const p=parseCSV(text);if(!p.length)throw new Error('No valid rows found');setWrestlers(p);setErr('');}catch(e){setErr(e.message||'Could not parse.');}}
  function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>imp(ev.target.result);r.readAsText(f);e.target.value='';}
  function upd(id,field,val){setWrestlers(wrestlers.map(w=>w.id!==id?w:{...w,[field]:(field==='age'||field==='weight')?(parseFloat(val)||0):val}));}
  function addRow(){const nw={id:uid(),name:'New Wrestler',age:14,grade:'9th',experience:'Beginner',weight:130};setWrestlers([...wrestlers,nw]);setEditId(nw.id);}
  function dlSample(){const b=new Blob([SAMPLE_CSV],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sample_wrestlers.csv';a.click();}
  return(
    <div className="p-6 max-w-6xl mx-auto">
      <h1 className="text-2xl font-bold mb-6" style={{color:'#111'}}>① Upload Wrestlers</h1>
      <div className="grid md:grid-cols-2 gap-5 mb-8">
        <div className="bg-white rounded-2xl shadow p-5 border-2 cp-gold-border border-dashed">
          <h2 className="font-bold mb-3" style={{color:'#111'}}>📁 Upload CSV File</h2>
          <input type="file" accept=".csv,.txt" onChange={handleFile} className="block w-full text-sm cursor-pointer"/>
          <p className="text-xs text-gray-400 mt-2">Columns: Name, Age, Grade, Experience, Weight</p>
          <button onClick={dlSample} className="mt-1 text-xs underline cp-gold-text">↓ Download sample CSV</button>
        </div>
        <div className="bg-white rounded-2xl shadow p-5">
          <h2 className="font-bold mb-3" style={{color:'#111'}}>📋 Paste CSV Data</h2>
          <textarea className="w-full h-28 border rounded-lg p-2 text-xs font-mono resize-none focus:outline-none" placeholder={"Name,Age,Grade,Experience,Weight\nAlex,14,9th,Beginner,125\n..."} value={paste} onChange={e=>setPaste(e.target.value)}/>
          <button onClick={()=>imp(paste)} className="mt-2 cp-btn text-sm">Import</button>
          <button onClick={()=>imp(SAMPLE_CSV)} className="mt-2 ml-2 text-sm border rounded-xl px-4 py-2 hover:bg-gray-50 cp-gold-text cp-gold-border" style={{borderWidth:1}}>Load Sample</button>
        </div>
      </div>
      {err&&<div className="bg-red-50 border border-red-300 text-red-700 rounded-xl p-3 mb-4 text-sm">⚠️ {err}</div>}
      <div className="bg-white rounded-2xl shadow overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b bg-gray-50">
          <h2 className="font-bold" style={{color:'#111'}}>Wrestler Roster <span className="text-gray-400 font-normal text-sm">({wrestlers.length})</span></h2>
          <button onClick={addRow} className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 text-sm font-medium">+ Add Row</button>
        </div>
        {wrestlers.length===0?(
          <div className="p-12 text-center text-gray-400"><div className="text-4xl mb-3">🐾</div>Upload a CSV, paste data, or load sample data to get started.</div>
        ):(
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wide">{['Name','Age','Grade','Experience','Weight (lbs)',''].map(h=><th key={h} className="text-left px-4 py-2 font-semibold">{h}</th>)}</tr></thead>
              <tbody>
                {wrestlers.map(w=>(
                  <tr key={w.id} className="border-t hover:bg-gray-50 transition-colors">
                    {editId===w.id?(
                      <>
                        <td className="px-2 py-1"><input className="border rounded px-2 py-1 w-40 text-sm" value={w.name} onChange={e=>upd(w.id,'name',e.target.value)}/></td>
                        <td className="px-2 py-1"><input type="number" className="border rounded px-2 py-1 w-16 text-sm" value={w.age} onChange={e=>upd(w.id,'age',e.target.value)}/></td>
                        <td className="px-2 py-1"><input className="border rounded px-2 py-1 w-16 text-sm" value={w.grade} onChange={e=>upd(w.id,'grade',e.target.value)}/></td>
                        <td className="px-2 py-1"><select className="border rounded px-2 py-1 text-sm" value={w.experience} onChange={e=>upd(w.id,'experience',e.target.value)}><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></td>
                        <td className="px-2 py-1"><input type="number" step="0.5" className="border rounded px-2 py-1 w-20 text-sm" value={w.weight} onChange={e=>upd(w.id,'weight',e.target.value)}/></td>
                        <td className="px-2 py-1"><button onClick={()=>setEditId(null)} className="text-green-600 font-semibold text-xs hover:underline">✓ Done</button></td>
                      </>
                    ):(
                      <>
                        <td className="px-4 py-2.5 font-medium">{w.name}</td>
                        <td className="px-4 py-2.5 text-gray-600">{w.age}</td>
                        <td className="px-4 py-2.5 text-gray-600">{w.grade}</td>
                        <td className="px-4 py-2.5"><Badge text={w.experience}/></td>
                        <td className="px-4 py-2.5 font-mono text-gray-700">{w.weight}</td>
                        <td className="px-4 py-2.5 flex gap-3">
                          <button onClick={()=>setEditId(w.id)} className="text-xs hover:underline cp-gold-text">Edit</button>
                          <button onClick={()=>setWrestlers(wrestlers.filter(x=>x.id!==w.id))} className="text-red-400 text-xs hover:underline">Remove</button>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* PAGE 2 — GROUPS */
function GroupsPage({wrestlers,groups,setGroups,unassigned,setUnassigned,setMatches}){
  const [moving,setMoving]=useState(null);
  const [warnings,setWarnings]=useState({});
  function recheck(grps){const w={};grps.forEach(g=>{const e=validateGroup(g.wrestlers);if(e.length)w[g.id]=e;});setWarnings(w);}
  function handleGenerate(){const{groups:g,unassigned:u}=generateGroups(wrestlers);setGroups(g);setUnassigned(u);setMatches([]);setWarnings({});setMoving(null);}
  function finishMove(toId){
    if(!moving)return;
    const{fromGroupId,wrestlerId}=moving;
    let wrestler=null;
    let nG=groups.map(g=>{if(g.id===fromGroupId){wrestler=g.wrestlers.find(w=>w.id===wrestlerId);return{...g,wrestlers:g.wrestlers.filter(w=>w.id!==wrestlerId)};}return g;});
    let nU=unassigned;
    if(!wrestler){wrestler=unassigned.find(w=>w.id===wrestlerId);nU=unassigned.filter(w=>w.id!==wrestlerId);}
    if(!wrestler){setMoving(null);return;}
    if(toId==='__new__') nG=[...nG,{id:uid(),label:'',wrestlers:[wrestler]}];
    else nG=nG.map(g=>g.id===toId?{...g,wrestlers:[...g.wrestlers,wrestler]}:g);
    const cl=nG.filter(g=>g.wrestlers.length>0);cl.forEach((g,i)=>{g.label=String.fromCharCode(65+i);});
    setGroups(cl);setUnassigned(nU);setMatches([]);recheck(cl);setMoving(null);
  }
  function eject(groupId,wrestlerId){
    let wrestler=null;
    const nG=groups.map(g=>{if(g.id===groupId){wrestler=g.wrestlers.find(w=>w.id===wrestlerId);return{...g,wrestlers:g.wrestlers.filter(w=>w.id!==wrestlerId)};}return g;});
    if(!wrestler)return;
    const cl=nG.filter(g=>g.wrestlers.length>0);cl.forEach((g,i)=>{g.label=String.fromCharCode(65+i);});
    setGroups(cl);setUnassigned([...unassigned,wrestler]);setMatches([]);recheck(cl);
  }
  return(
    <div className="p-6 max-w-6xl mx-auto">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#111'}}>② Bracket Groups</h1>
          {Object.keys(warnings).length>0&&<p className="text-sm text-red-600 mt-1">⚠️ {Object.keys(warnings).length} group(s) have violations</p>}
        </div>
        <button onClick={handleGenerate} disabled={wrestlers.length<2} className="cp-btn shadow text-sm">⚙️ Auto-Generate Groups ({wrestlers.length} wrestlers)</button>
      </div>
      {groups.length===0&&unassigned.length===0&&(
        <div className="cp-info rounded-2xl p-10 text-center">
          <div className="text-4xl mb-3">⚙️</div>
          Click <strong>Auto-Generate Groups</strong> to create brackets automatically.
          <p className="text-xs mt-2 opacity-70">Priority: pure Adv → pure Int → pure Beg → I+A mix → 2B+2I (rare) → 2-person (last resort)</p>
        </div>
      )}
      {moving&&(
        <div className="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-3 mb-4 text-sm text-yellow-800 flex items-center justify-between">
          <span>📌 Click a group to move the selected wrestler into it</span>
          <button onClick={()=>setMoving(null)} className="font-semibold underline ml-4">✕ Cancel</button>
        </div>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {groups.map(group=>{
          const errs=warnings[group.id]||[];
          const isTarget=moving&&moving.fromGroupId!==group.id;
          const sz=group.wrestlers;
          const is2=sz.length===2;
          return(
            <div key={group.id} onClick={()=>isTarget&&finishMove(group.id)}
              className={`bg-white rounded-2xl shadow p-4 border-2 transition-all ${errs.length?'border-red-400':isTarget?'border-yellow-400 ring-2 ring-yellow-100 cursor-pointer':is2?'border-orange-300':'border-transparent'}`}>
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <span className="cp-dark font-bold text-lg w-9 h-9 rounded-full flex items-center justify-center">{group.label}</span>
                  <span className="text-gray-500 text-sm">{sz.length} wrestlers</span>
                  {is2&&<span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-medium">2-person</span>}
                </div>
                {sz.length>0&&<span className="text-xs text-gray-400 font-mono">{Math.min(...sz.map(w=>w.weight))}–{Math.max(...sz.map(w=>w.weight))} lbs</span>}
              </div>
              {errs.length>0&&<div className="bg-red-50 rounded-lg p-2 mb-3 text-xs text-red-700 space-y-0.5">{errs.map((e,i)=><div key={i}>⚠️ {e}</div>)}</div>}
              <div className="space-y-1">
                {group.wrestlers.map(w=>(
                  <div key={w.id} className={`flex items-center justify-between py-1.5 px-2 rounded-lg text-sm ${moving?.wrestlerId===w.id?'bg-yellow-100':'hover:bg-gray-50'}`}>
                    <div className="flex items-center gap-2 overflow-hidden"><Badge text={w.experience}/><span className="font-medium truncate">{w.name}</span></div>
                    <div className="flex items-center gap-1 shrink-0 ml-2">
                      <span className="text-gray-400 text-xs font-mono">{w.weight}</span>
                      <span className="text-gray-300 text-xs">· {w.age}y</span>
                      <button onClick={e=>{e.stopPropagation();setMoving({fromGroupId:group.id,wrestlerId:w.id});}} className="ml-1 text-xs hover:underline cp-gold-text">↕</button>
                      <button onClick={e=>{e.stopPropagation();eject(group.id,w.id);}} className="text-gray-300 text-xs hover:text-red-400">✕</button>
                    </div>
                  </div>
                ))}
              </div>
              {sz.length>0&&(
                <div className="mt-3 pt-2 border-t flex gap-2 text-xs text-gray-400">
                  <span>🎂 Age {Math.min(...sz.map(w=>w.age))}–{Math.max(...sz.map(w=>w.age))}</span><span>·</span>
                  <span className={errs.length?'text-red-400':'text-green-600'}>{errs.length?'✗ Invalid':'✓ Valid'}</span>
                </div>
              )}
            </div>
          );
        })}
        {moving&&(
          <div onClick={()=>finishMove('__new__')} className="bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 flex items-center justify-center cursor-pointer hover:border-yellow-400 hover:bg-yellow-50 transition-all min-h-36">
            <span className="text-gray-400 text-sm font-medium">+ New Group</span>
          </div>
        )}
      </div>
      {unassigned.length>0&&(
        <div className="mt-6 bg-orange-50 rounded-2xl border border-orange-200 p-5">
          <h2 className="font-bold text-orange-800 mb-1">⚠️ Unassigned Wrestlers ({unassigned.length})</h2>
          <p className="text-xs text-orange-600 mb-3">Couldn't be placed automatically. Use ↕ to move them manually.</p>
          <div className="flex flex-wrap gap-2">
            {unassigned.map(w=>(
              <div key={w.id} className={`bg-white border rounded-xl px-3 py-2 text-sm flex items-center gap-2 shadow-sm ${moving?.wrestlerId===w.id?'border-yellow-400 bg-yellow-50':'border-orange-200'}`}>
                <Badge text={w.experience}/><span className="font-medium">{w.name}</span>
                <span className="text-gray-400 text-xs font-mono">{w.weight}lbs · {w.age}y</span>
                <button onClick={()=>setMoving({fromGroupId:'__unassigned__',wrestlerId:w.id})} className="text-xs hover:underline cp-gold-text">↕ Move</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* PAGE 3 — SCHEDULE */
function SchedulePage({groups,numMats,setNumMats,matches,setMatches}){
  const rounds=[...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  const mats=[...new Set(matches.map(m=>m.mat))].sort((a,b)=>a-b);
  const done=matches.filter(m=>m.winner).length;
  const winLabel=m=>{if(!m.winner)return null;const n=m.winner===m.w1.id?m.w1.name:m.w2.name;return `${n} — ${m.winType==='pin'?'Pin (6pts)':'Points (4pts)'}`;};
  return(
    <div className="p-6 max-w-6xl mx-auto">
      <div className="flex items-center gap-4 mb-6 flex-wrap">
        <h1 className="text-2xl font-bold" style={{color:'#111'}}>③ Match Schedule</h1>
        <div className="flex items-center gap-2 bg-white rounded-xl shadow px-3 py-2">
          <label className="text-sm font-medium text-gray-600">Mats:</label>
          <select value={numMats} onChange={e=>setNumMats(parseInt(e.target.value))} className="border-0 text-sm font-bold focus:outline-none bg-transparent">
            {[1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <button onClick={()=>setMatches(generateSchedule(groups,numMats))} disabled={groups.length===0} className="cp-btn text-sm shadow">📋 Generate Schedule</button>
        {matches.length>0&&<span className="text-sm text-gray-500 ml-auto">{done}/{matches.length} completed</span>}
      </div>
      {matches.length===0?(
        <div className="cp-info rounded-2xl p-10 text-center"><div className="text-4xl mb-3">📋</div>{groups.length===0?'Create groups first (Step ②).':'Click Generate Schedule.'}</div>
      ):(
        rounds.map(round=>(
          <div key={round} className="mb-7">
            <div className="flex items-center gap-3 mb-3">
              <h2 className="font-bold text-lg text-white px-4 py-1.5 rounded-full" style={{background:'#111'}}>Round {round}</h2>
              <span className="text-sm text-gray-400">{matches.filter(m=>m.round===round&&m.winner).length} / {matches.filter(m=>m.round===round).length} done</span>
            </div>
            <div className={`grid gap-4 ${numMats>1?'md:grid-cols-2':'grid-cols-1'}`}>
              {mats.map(mat=>{
                const mm=matches.filter(m=>m.round===round&&m.mat===mat);
                if(!mm.length)return null;
                return(
                  <div key={mat} className="bg-white rounded-2xl shadow p-4">
                    <div className="mb-3"><span className="text-white font-bold px-3 py-1 rounded-lg text-sm" style={{background:'#111'}}>Mat {mat}</span></div>
                    <div className="space-y-2">
                      {mm.map(m=>(
                        <div key={m.id} className={`flex flex-col px-3 py-2.5 rounded-xl text-sm ${m.winner?'bg-yellow-50':'bg-gray-50'}`}>
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'#C9A227',color:'#111'}}>{m.groupLabel}</span>
                            <span className={`font-medium flex-1 ${m.winner===m.w1.id?'text-green-700':''}`}>{m.w1.name}</span>
                            <span className="text-gray-300 font-bold text-xs">VS</span>
                            <span className={`font-medium flex-1 text-right ${m.winner===m.w2.id?'text-green-700':''}`}>{m.w2.name}</span>
                            {m.winner?<span className="text-green-500 text-xs shrink-0">✓</span>:<span className="text-gray-300 text-xs">—</span>}
                          </div>
                          {m.winner&&<div className="text-xs mt-1 cp-gold-text">🏆 {winLabel(m)}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* PAGE 4 — RESULTS */
function ResultsPage({matches,setMatches}){
  const [filter,setFilter]=useState('all');
  const pick=(id,wId,type)=>setMatches(matches.map(m=>m.id===id?{...m,winner:wId,winType:type}:m));
  const undo=(id)=>setMatches(matches.map(m=>m.id===id?{...m,winner:null,winType:null}:m));
  const rounds=[...new Set(matches.map(m=>m.round))].sort((a,b)=>a-b);
  const done=matches.filter(m=>m.winner).length;
  const pct=matches.length?Math.round(done/matches.length*100):0;
  const filtered=(round)=>matches.filter(m=>{
    if(m.round!==round)return false;
    if(filter==='pending')return !m.winner;
    if(filter==='completed')return !!m.winner;
    return true;
  });
  return(
    <div className="p-6 max-w-3xl mx-auto">
      <h1 className="text-2xl font-bold mb-6" style={{color:'#111'}}>④ Live Results Entry</h1>
      {matches.length===0?(
        <div className="cp-info rounded-2xl p-10 text-center"><div className="text-4xl mb-3">🎯</div>Generate a schedule first (Step ③).</div>
      ):(
        <>
          <div className="bg-white rounded-2xl shadow p-4 mb-6">
            <div className="flex items-center justify-between mb-2 text-sm">
              <span className="font-semibold" style={{color:'#111'}}>Tournament Progress</span>
              <span className="font-bold cp-gold-text">{done} / {matches.length} · {pct}%</span>
            </div>
            <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-3 rounded-full transition-all" style={{width:pct+'%',background:'linear-gradient(to right,#C9A227,#A8841E)'}}/>
            </div>
            <div className="flex gap-2 mt-3">
              {['all','pending','completed'].map(f=>(
                <button key={f} onClick={()=>setFilter(f)} className={`px-3 py-1 rounded-lg text-xs font-medium capitalize`} style={filter===f?{background:'#C9A227',color:'#111'}:{background:'#f3f4f6',color:'#555'}}>{f}</button>
              ))}
            </div>
            <div className="mt-3 pt-3 border-t flex items-center gap-6 text-xs text-gray-500">
              <div className="flex items-center gap-1.5"><span style={{display:'inline-block',width:12,height:12,borderRadius:3,background:'#111'}}></span><strong>📌 Pin = 6 pts</strong></div>
              <div className="flex items-center gap-1.5"><span style={{display:'inline-block',width:12,height:12,borderRadius:3,background:'#4ade80'}}></span><strong>✓ Points = 4 pts</strong></div>
            </div>
          </div>
          {rounds.map(round=>{
            const rm=filtered(round);
            if(!rm.length)return null;
            return(
              <div key={round} className="mb-6">
                <h2 className="font-bold mb-3 px-4 py-2 rounded-xl text-white" style={{background:'#111'}}>
                  Round {round} <span className="ml-2 font-normal text-sm cp-gold-text">({matches.filter(m=>m.round===round&&m.winner).length}/{matches.filter(m=>m.round===round).length})</span>
                </h2>
                <div className="space-y-4">
                  {rm.map(m=>{
                    const wName=m.winner?(m.winner===m.w1.id?m.w1.name:m.w2.name):null;
                    return(
                      <div key={m.id} className={`bg-white rounded-2xl shadow border-2 p-4 transition-all ${m.winner?'border-yellow-400':'border-transparent'}`}>
                        <div className="flex items-center justify-between mb-3">
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'#C9A227',color:'#111'}}>Group {m.groupLabel}</span>
                            <span className="text-xs text-gray-400">Mat {m.mat}</span>
                          </div>
                          {m.winner&&<button onClick={()=>undo(m.id)} className="text-xs text-gray-400 hover:text-red-500 underline">Undo</button>}
                        </div>
                        {m.winner?(
                          <div className="rounded-xl p-3 text-center" style={{background:'#fef9e7',border:'1.5px solid #C9A227'}}>
                            <div className="font-bold text-lg">🏆 {wName}</div>
                            <div className="text-sm mt-1 cp-gold-text">Won by <strong>{m.winType==='pin'?'Pin — 6 points':'Points — 4 points'}</strong></div>
                          </div>
                        ):(
                          <div>
                            <p className="text-xs text-gray-400 mb-3 font-semibold uppercase tracking-wider">Select winner &amp; win type:</p>
                            <div className="grid grid-cols-2 gap-3">
                              {[m.w1,m.w2].map(wrestler=>(
                                <div key={wrestler.id} className="bg-gray-50 rounded-xl p-3 border border-gray-200">
                                  <div className="font-bold text-sm mb-0.5">{wrestler.name}</div>
                                  <div className="text-xs text-gray-400 mb-3">{wrestler.weight}lbs · {wrestler.experience} · Age {wrestler.age}</div>
                                  <div className="flex flex-col gap-2">
                                    <button onClick={()=>pick(m.id,wrestler.id,'pin')} className="pin-btn text-xs">📌 Win by Pin <span style={{opacity:.7}}>(6 pts)</span></button>
                                    <button onClick={()=>pick(m.id,wrestler.id,'points')} className="pts-btn text-xs">✓ Win by Points <span style={{opacity:.7}}>(4 pts)</span></button>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

/* PAGE 5 — STANDINGS */
function StandingsPage({groups,matches}){
  const ICONS=['🥇','🥈','🥉','4th'];
  return(
    <div className="p-6 max-w-4xl mx-auto">
      <h1 className="text-2xl font-bold mb-6" style={{color:'#111'}}>⑤ Standings &amp; Placements</h1>
      {groups.length===0?(
        <div className="cp-info rounded-2xl p-10 text-center"><div className="text-4xl mb-3">🏆</div>No groups yet. Complete steps ①–③ first.</div>
      ):(
        <div className="space-y-6">
          {groups.map(group=>{
            const standings=computeStandings(group,matches);
            const gm=matches.filter(m=>m.groupId===group.id);
            const total=gm.length,completed=gm.filter(m=>m.winner).length,finished=total>0&&completed===total;
            const is2=group.wrestlers.length===2;
            return(
              <div key={group.id} className="bg-white rounded-2xl shadow overflow-hidden">
                <div className="cp-dark px-5 py-3 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <h2 className="font-bold text-lg">Group {group.label}</h2>
                    {is2&&<span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:'#C9A227',color:'#111'}}>2-person</span>}
                  </div>
                  <div className="flex items-center gap-3 text-sm">
                    <span className="cp-gold-text">{completed}/{total} matches</span>
                    {finished&&<span className="bg-green-500 text-white text-xs px-2 py-0.5 rounded-full font-semibold">FINAL</span>}
                  </div>
                </div>
                {total>0&&<div className="h-1 bg-gray-100"><div className="h-1 transition-all" style={{width:(completed/total*100)+'%',background:'#C9A227'}}/></div>}
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wide">
                      <th className="text-left px-4 py-2">Place</th>
                      <th className="text-left px-4 py-2">Wrestler</th>
                      <th className="text-left px-4 py-2 hidden sm:table-cell">Details</th>
                      <th className="text-center px-3 py-2 text-green-700">W</th>
                      <th className="text-center px-3 py-2 text-red-500">L</th>
                      <th className="text-center px-3 py-2" style={{color:'#C9A227'}}>Pins</th>
                      <th className="text-center px-3 py-2" style={{color:'#111'}}>Pts</th>
                    </tr>
                  </thead>
                  <tbody>
                    {standings.map((s,i)=>(
                      <tr key={s.wrestler.id} className={`border-t transition-colors ${i===0&&finished?'bg-yellow-50':''}`}>
                        <td className="px-4 py-3 text-lg w-14 text-center">{ICONS[i]||`${i+1}.`}</td>
                        <td className="px-4 py-3 font-semibold">{s.wrestler.name}</td>
                        <td className="px-4 py-3 hidden sm:table-cell"><div className="flex items-center gap-2"><Badge text={s.wrestler.experience}/><span className="text-gray-400 text-xs">{s.wrestler.weight}lbs · Age {s.wrestler.age} · {s.wrestler.grade}</span></div></td>
                        <td className="px-3 py-3 text-center font-bold text-green-700">{s.wins}</td>
                        <td className="px-3 py-3 text-center text-red-400">{s.losses}</td>
                        <td className="px-3 py-3 text-center font-bold cp-gold-text">{s.pins}</td>
                        <td className="px-3 py-3 text-center font-bold text-xl" style={{color:'#111'}}>{s.points}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* PAGE 6 — RESET */
function ResetPage({setWrestlers,setGroups,setUnassigned,setMatches,setNumMats,setPage}){
  const [step,setStep]=useState('idle'); // idle | confirm | done

  function doReset(){
    setWrestlers([]);
    setGroups([]);
    setUnassigned([]);
    setMatches([]);
    setNumMats(2);
    ['wrestlers','groups','unassigned','matches','numMats'].forEach(k=>{
      try{localStorage.removeItem('cp_'+k);}catch(_){}
    });
    setStep('done');
  }

  return(
    <div className="p-6 max-w-lg mx-auto mt-10">
      <div className="bg-white rounded-2xl shadow-lg overflow-hidden border-2 border-red-200">
        <div className="bg-red-600 px-6 py-4">
          <h1 className="text-xl font-bold text-white">⑥ Reset Tournament</h1>
          <p className="text-red-200 text-sm mt-1">Clear all data and start fresh</p>
        </div>

        <div className="p-6">
          {step==='idle'&&(
            <>
              <p className="text-gray-600 mb-6 text-sm leading-relaxed">
                This will permanently erase <strong>all wrestlers, groups, matches, and results</strong> saved in this browser. The app will return to a blank state.
              </p>
              <ul className="text-sm text-gray-500 mb-8 space-y-1.5">
                {['All uploaded wrestlers','All bracket groups','The full match schedule','All results and scores'].map(item=>(
                  <li key={item} className="flex items-center gap-2"><span className="text-red-400 font-bold">✕</span>{item}</li>
                ))}
              </ul>
              <button
                onClick={()=>setStep('confirm')}
                className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-colors text-sm">
                Reset Tournament Data
              </button>
            </>
          )}

          {step==='confirm'&&(
            <>
              <div className="bg-red-50 border-2 border-red-400 rounded-xl p-5 mb-6 text-center">
                <div className="text-4xl mb-2">⚠️</div>
                <p className="font-bold text-red-800 text-lg">Are you sure?</p>
                <p className="text-red-600 text-sm mt-1">This cannot be undone. All tournament data will be lost.</p>
              </div>
              <div className="flex gap-3">
                <button
                  onClick={()=>setStep('idle')}
                  className="flex-1 border-2 border-gray-300 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors text-sm">
                  Cancel — Keep Data
                </button>
                <button
                  onClick={doReset}
                  className="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-colors text-sm">
                  Yes, Reset Everything
                </button>
              </div>
            </>
          )}

          {step==='done'&&(
            <div className="text-center py-4">
              <div className="text-5xl mb-4">✅</div>
              <p className="font-bold text-gray-800 text-lg mb-1">Tournament Reset</p>
              <p className="text-gray-500 text-sm mb-6">All data has been cleared. Ready for a new tournament.</p>
              <button
                onClick={()=>setPage('upload')}
                className="cp-btn px-8 py-3 text-sm">
                Start New Tournament →
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ROOT */
function App(){
  const [page,setPage]=useState('upload');
  const [wrestlers,setWrestlers]=useState(()=>load('wrestlers',[]));
  const [groups,setGroups]=useState(()=>load('groups',[]));
  const [unassigned,setUnassigned]=useState(()=>load('unassigned',[]));
  const [matches,setMatches]=useState(()=>load('matches',[]));
  const [numMats,setNumMats]=useState(()=>load('numMats',2));
  useEffect(()=>{ save('wrestlers',wrestlers); },[wrestlers]);
  useEffect(()=>{ save('groups',groups); },[groups]);
  useEffect(()=>{ save('unassigned',unassigned); },[unassigned]);
  useEffect(()=>{ save('matches',matches); },[matches]);
  useEffect(()=>{ save('numMats',numMats); },[numMats]);
  return(
    <div className="min-h-screen" style={{background:'#f3f4f6'}}>
      <Nav page={page} setPage={setPage} wrestlers={wrestlers} groups={groups}/>
      <div className="pb-12">
        {page==='upload'    && <UploadPage    wrestlers={wrestlers}  setWrestlers={setWrestlers}/>}
        {page==='groups'    && <GroupsPage    wrestlers={wrestlers}  groups={groups} setGroups={setGroups} unassigned={unassigned} setUnassigned={setUnassigned} setMatches={setMatches}/>}
        {page==='schedule'  && <SchedulePage  groups={groups} numMats={numMats} setNumMats={setNumMats} matches={matches} setMatches={setMatches}/>}
        {page==='results'   && <ResultsPage   matches={matches} setMatches={setMatches}/>}
        {page==='standings' && <StandingsPage groups={groups} matches={matches}/>}
        {page==='reset'     && <ResetPage setWrestlers={setWrestlers} setGroups={setGroups} setUnassigned={setUnassigned} setMatches={setMatches} setNumMats={setNumMats} setPage={setPage}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
