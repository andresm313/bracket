<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Paw — Tournament Viewer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root{--gold:#C9A227;--gold-dk:#A8841E;--black:#111111;}
    body{background:#f3f4f6;margin:0;}
    .cp-nav{background:#111111;}
    .cp-gold-text{color:var(--gold);}
    .cp-nav-active{background:var(--gold);color:#111!important;font-weight:700;}
    .cp-nav-inactive{color:#d4b483;}
    .cp-nav-inactive:hover{background:#222;}
    .badge-b{background:#d1fae5;color:#065f46;}
    .badge-i{background:#fef3c7;color:#92400e;}
    .badge-a{background:#fee2e2;color:#991b1b;}
    .pulse{animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .mat-col{background:#fff;border-radius:1.25rem;overflow:hidden;flex:1;min-width:260px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
    .mat-header{background:#C9A227;color:#111;padding:.75rem 1rem;font-weight:900;font-size:1.25rem;text-align:center;letter-spacing:.05em;}
    .now-card{background:#fffbeb;border:2px solid #C9A227;border-radius:1rem;padding:.9rem;}
    .queue-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:.85rem;padding:.7rem;}
    .done-card{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:.85rem;padding:.65rem;}
    .lbl-now{background:#C9A227;color:#111;font-size:.6rem;font-weight:800;padding:.15rem .55rem;border-radius:9999px;letter-spacing:.1em;text-transform:uppercase;}
    .lbl-next{background:#e5e7eb;color:#555;font-size:.6rem;font-weight:700;padding:.15rem .55rem;border-radius:9999px;letter-spacing:.08em;text-transform:uppercase;}
    .lbl-soon{background:#f3f4f6;color:#9ca3af;font-size:.6rem;font-weight:600;padding:.12rem .5rem;border-radius:9999px;letter-spacing:.06em;text-transform:uppercase;}
    .vs-pill{background:#e5e7eb;color:#9ca3af;font-size:.65rem;font-weight:800;padding:.12rem .45rem;border-radius:9999px;flex-shrink:0;}
    .w-name{font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .w-sub{font-size:.7rem;color:#9ca3af;margin-top:.1rem;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── FIREBASE CONFIG ── paste the SAME config as index.html ──────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyB3F1G1cJWZllc_Vr_L49_42sXRQda3RkE",
  authDomain:        "club-paw-tournament.firebaseapp.com",
  databaseURL:       "https://club-paw-tournament-default-rtdb.firebaseio.com",
  projectId:         "club-paw-tournament",
  storageBucket:     "club-paw-tournament.firebasestorage.app",
  messagingSenderId: "372778383531",
  appId:             "1:372778383531:web:0f75a2732e57429b485fee"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
// ─────────────────────────────────────────────────────────────────────────────

function computeStandings(group, matches) {
  const rows = group.wrestlers.map(w => ({ wrestler: w, wins:0, losses:0, pins:0, points:0 }));
  matches.filter(m => m.groupId === group.id && m.winner).forEach(m => {
    const loserId = m.winner === m.w1.id ? m.w2.id : m.w1.id;
    const win = rows.find(r => r.wrestler.id === m.winner);
    const los = rows.find(r => r.wrestler.id === loserId);
    if (win) { win.wins++; win.points += m.winType==='pin'?6:4; if(m.winType==='pin') win.pins++; }
    if (los) los.losses++;
  });
  rows.sort((a,b) => b.points-a.points || b.wins-a.wins || b.pins-a.pins);
  return rows;
}

function Badge({ text }) {
  const cls = text==='Beginner'?'badge-b':text==='Intermediate'?'badge-i':'badge-a';
  return <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${cls}`}>{text?text[0]:'?'}</span>;
}

/* NAV */
function Nav({ page, setPage, lastUpdated }) {
  const tabs = [
    { id:'now',       label:'🟢 Now Wrestling' },
    { id:'standings', label:'🏆 Standings'     },
    { id:'schedule',  label:'📋 Schedule'       },
  ];
  return (
    <nav className="cp-nav shadow-xl sticky top-0 z-50">
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <div className="flex items-center gap-3">
          <div className="font-bold cp-gold-text text-base tracking-widest">🐾 CLUB PAW</div>
          <span className="text-gray-600 text-xs hidden sm:block">Tournament Viewer</span>
        </div>
        <div className="flex items-center gap-1">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setPage(t.id)}
              className={`px-3 py-1.5 rounded-lg text-sm transition-all ${page===t.id?'cp-nav-active':'cp-nav-inactive'}`}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-2 text-xs" style={{color:'#555'}}>
          <span className="pulse" style={{color:'#C9A227'}}>●</span>
          <span>Live · {lastUpdated}</span>
        </div>
      </div>
    </nav>
  );
}

function Empty({ message }) {
  return (
    <div className="bg-white rounded-2xl shadow p-12 text-center max-w-md mx-auto mt-8">
      <div className="text-5xl mb-4">🐾</div>
      <p className="font-medium text-gray-500">{message}</p>
      <p className="text-xs mt-2 text-gray-400">Data will appear once the tournament director sets up the brackets.</p>
    </div>
  );
}

/* BO3 HELPER */
function getBO3State(groupId, matches) {
  const gm = matches.filter(m => m.groupId === groupId && m.bo3).sort((a,b) => a.round - b.round);
  if (!gm.length) return null;
  const m1 = gm[0], m2 = gm[1], m3 = gm[2];
  const w1Id = m1.w1.id, w2Id = m1.w2.id;
  let w1Wins=0, w2Wins=0;
  if (m1?.winner) { if(m1.winner===w1Id) w1Wins++; else w2Wins++; }
  if (m2?.winner) { if(m2.winner===w1Id) w1Wins++; else w2Wins++; }
  if (m3?.winner) { if(m3.winner===w1Id) w1Wins++; else w2Wins++; }
  const seriesOver = w1Wins===2 || w2Wins===2;
  const seriesWinnerId = w1Wins===2 ? w1Id : w2Wins===2 ? w2Id : null;
  return { w1Wins, w2Wins, m1, m2, m3, seriesOver, seriesWinnerId, w1Id, w2Id };
}

function countableMatches(matches) {
  return matches.filter(m => {
    if (!m.bo3decider) return true;
    if (m.winner) return true;
    const bo3 = getBO3State(m.groupId, matches);
    if (!bo3) return true;
    return bo3.m1?.winner && bo3.m2?.winner && bo3.w1Wins===1 && bo3.w2Wins===1;
  });
}

/* NOW WRESTLING */
function NowWrestlingView({ matches }) {
  if (!matches.length) return <Empty message="Schedule not generated yet." />;

  const mats     = [...new Set(matches.map(m => m.mat))].sort((a,b) => a-b);
  const countable  = countableMatches(matches);
  const totalDone  = countable.filter(m => m.winner).length;
  const totalPct   = countable.length ? Math.round(totalDone / countable.length * 100) : 0;

  // Pending matches per mat in round order — skip locked BO3 matches
  function getQueue(mat) {
    return matches
      .filter(m => {
        if (m.mat !== mat || m.winner) return false;
        // Skip BO3 Match 2 if Match 1 not done yet (show M1 first)
        if (m.bo3 && m.round === 2) {
          const bo3 = getBO3State(m.groupId, matches);
          if (bo3 && !bo3.m1?.winner) return false;
        }
        // Skip BO3 Match 3 (decider) if not needed or not yet unlocked
        if (m.bo3decider) {
          const bo3 = getBO3State(m.groupId, matches);
          if (!bo3) return false;
          if (bo3.seriesOver) return false; // series already decided
          if (!bo3.m1?.winner || !bo3.m2?.winner) return false; // matches 1+2 not done
          if (!(bo3.w1Wins === 1 && bo3.w2Wins === 1)) return false; // not tied
        }
        return true;
      })
      .sort((a,b) => a.round - b.round);
  }

  // Most recently completed match on this mat
  function getLastDone(mat) {
    const done = matches
      .filter(m => m.mat === mat && m.winner)
      .sort((a,b) => b.round - a.round);
    return done[0] || null;
  }

  const SLOTS = [
    { lbl:'ON MAT NOW', cls:'lbl-now',  card:'now-card',   nameSize:'text-base', divider:true  },
    { lbl:'UP NEXT',    cls:'lbl-next', card:'queue-card',  nameSize:'text-sm',   divider:false },
    { lbl:'AFTER NEXT', cls:'lbl-soon', card:'queue-card',  nameSize:'text-sm',   divider:false },
    { lbl:'COMING UP',  cls:'lbl-soon', card:'queue-card',  nameSize:'text-sm',   divider:false },
    { lbl:'COMING UP',  cls:'lbl-soon', card:'queue-card',  nameSize:'text-sm',   divider:false },
  ];

  return (
    <div>
      {/* Progress */}
      <div className="bg-white rounded-2xl shadow p-4 mb-5">
        <div className="flex items-center justify-between mb-2 text-sm">
          <span className="font-semibold text-gray-700">Tournament Progress</span>
          <span className="font-bold cp-gold-text">{totalDone} / {countable.length} matches · {totalPct}%</span>
        </div>
        <div className="h-2 rounded-full overflow-hidden" style={{background:'#e5e7eb'}}>
          <div className="h-2 rounded-full transition-all" style={{width:totalPct+'%',background:'linear-gradient(to right,#C9A227,#A8841E)'}}/>
        </div>
      </div>

      {/* Mat columns */}
      <div className="flex gap-3 overflow-x-auto pb-4" style={{alignItems:'flex-start'}}>
        {mats.map(mat => {
          const queue      = getQueue(mat);
          const lastDone   = getLastDone(mat);
          const matCountable = countableMatches(matches).filter(m => m.mat===mat);
          const matTotal   = matCountable.length;
          const matDone    = matCountable.filter(m => m.winner).length;
          const allDone    = matTotal > 0 && matDone === matTotal;

          return (
            <div key={mat} className="mat-col" style={{flex:'1 1 270px',minWidth:265}}>

              {/* Mat header */}
              <div className="mat-header">Mat {mat}</div>

              {/* Mat mini progress */}
              <div className="px-4 pt-2.5 pb-1">
                <div className="flex justify-between mb-1" style={{fontSize:'.68rem',color:'#9ca3af'}}>
                  <span>{matDone}/{matTotal} done</span>
                  <span>{matTotal>0?Math.round(matDone/matTotal*100):0}%</span>
                </div>
                <div className="h-1 rounded-full" style={{background:'#e5e7eb'}}>
                  <div className="h-1 rounded-full" style={{width:(matTotal>0?matDone/matTotal*100:0)+'%',background:'#C9A227'}}/>
                </div>
              </div>

              <div className="p-3 space-y-2">
                {allDone ? (
                  <div className="text-center py-10">
                    <div className="text-3xl mb-2">✅</div>
                    <p className="font-bold text-sm" style={{color:'#16a34a'}}>All done on this mat!</p>
                  </div>
                ) : (
                  <>
                    {queue.slice(0, 5).map((m, idx) => {
                      const slot = SLOTS[idx] || SLOTS[4];
                      return (
                        <div key={m.id} className={slot.card}>
                          {/* Label row */}
                          {(() => {
                            const bo3 = m.bo3 ? getBO3State(m.groupId, matches) : null;
                            return (
                              <div className="flex items-center gap-2 mb-2">
                                <span className={slot.cls}>{slot.lbl}</span>
                                <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'#C9A227',color:'#111',fontSize:'.6rem'}}>
                                  {m.groupLabel}
                                </span>
                                {m.bo3 && bo3 && (
                                  <span className="text-xs font-semibold px-1.5 py-0.5 rounded-full" style={{background: m.bo3decider?'#dcfce7':'#f3f4f6', color: m.bo3decider?'#166534':'#6b7280', fontSize:'.58rem'}}>
                                    {m.bo3decider ? '🏆 M3' : `M${m.round}`} · {bo3.w1Wins}-{bo3.w2Wins}
                                  </span>
                                )}
                                <span className="ml-auto text-xs" style={{color:'#9ca3af',fontSize:'.65rem'}}>Rnd {m.round}</span>
                              </div>
                            );
                          })()}

                          {/* Wrestlers */}
                          <div className="flex items-center gap-2">
                            <div className="flex-1 min-w-0">
                              <div className={`w-name ${slot.nameSize}`}>{m.w1.name}</div>
                              <div className="w-sub">{m.w1.weight}lbs · Age {m.w1.age}</div>
                            </div>
                            <span className="vs-pill">VS</span>
                            <div className="flex-1 min-w-0 text-right">
                              <div className={`w-name ${slot.nameSize}`}>{m.w2.name}</div>
                              <div className="w-sub">{m.w2.weight}lbs · Age {m.w2.age}</div>
                            </div>
                          </div>

                          {/* Gold accent line under ON MAT NOW */}
                          {slot.divider && (
                            <div className="mt-2 h-px rounded-full" style={{background:'linear-gradient(to right,#C9A227,transparent)'}}/>
                          )}
                        </div>
                      );
                    })}

                    {/* Last completed on this mat */}
                    {lastDone && (
                      <div className="done-card mt-1">
                        <div className="flex items-center gap-1.5 mb-1">
                          <span style={{color:'#16a34a',fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>✓ Just Finished</span>
                          <span className="ml-auto" style={{color:'#9ca3af',fontSize:'.62rem'}}>Rnd {lastDone.round}</span>
                        </div>
                        <div style={{fontSize:'.75rem',color:'#666'}}>
                          <span className={lastDone.winner===lastDone.w1.id?'text-green-400 font-bold':''}>{lastDone.w1.name}</span>
                          <span className="mx-1" style={{color:'#d1d5db'}}>vs</span>
                          <span className={lastDone.winner===lastDone.w2.id?'text-green-600 font-bold':''}>{lastDone.w2.name}</span>
                        </div>
                        <div style={{fontSize:'.72rem',marginTop:'.25rem',color:'#C9A227'}}>
                          🏆 {lastDone.winner===lastDone.w1.id?lastDone.w1.name:lastDone.w2.name} — {lastDone.winType==='pin'?'Pin (6pts)':'Points (4pts)'}
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* STANDINGS */
function StandingsView({ groups, matches }) {
  const ICONS = ['🥇','🥈','🥉','4th'];
  if (!groups.length) return <Empty message="No groups created yet." />;
  return (
    <div className="space-y-6">
      {groups.map(group => {
        const is2       = group.wrestlers.length === 2;
        const standings = computeStandings(group, matches);
        const gm        = matches.filter(m => m.groupId===group.id);
        const bo3       = is2 ? getBO3State(group.id, matches) : null;
        const completed = gm.filter(m => m.winner).length;
        const total     = gm.length;
        const finished  = is2 ? (bo3 && bo3.seriesOver) : (total > 0 && completed === total);
        const pct       = total ? Math.round(completed/total*100) : 0;
        const seriesWinner = is2 && bo3 && bo3.seriesWinnerId
          ? (bo3.seriesWinnerId === group.wrestlers[0].id ? group.wrestlers[0].name : group.wrestlers[1].name)
          : null;

        return (
          <div key={group.id} className="rounded-2xl overflow-hidden shadow bg-white">
            <div className="px-5 py-3 flex items-center justify-between" style={{background:'#111111'}}>
              <div className="flex items-center gap-2">
                <span className="font-bold text-xl text-white">Group {group.label}</span>
                <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:'#C9A227',color:'#111'}}>
                  {is2 ? 'Best of 3' : `${group.wrestlers.length}-person`}
                </span>
              </div>
              <div className="flex items-center gap-3">
                {is2 && bo3
                  ? <span className="text-sm font-bold cp-gold-text">Series: {bo3.w1Wins}–{bo3.w2Wins}</span>
                  : <span className="text-sm cp-gold-text">{completed}/{total} matches</span>
                }
                {finished && (
                  <span className="bg-green-500 text-white text-xs px-2 py-0.5 rounded-full font-semibold">
                    {is2 && seriesWinner ? `${seriesWinner} wins!` : 'FINAL'}
                  </span>
                )}
              </div>
            </div>

            {/* BO3 match-by-match strip */}
            {is2 && bo3 && (
              <div className="px-5 py-2 flex items-center gap-3 text-xs border-b bg-gray-50">
                {[bo3.m1, bo3.m2, bo3.m3].map((m, i) => m ? (
                  <div key={i} className={`flex items-center gap-1 px-2 py-1 rounded-lg ${
                    !m.winner && m.bo3decider && !(bo3.w1Wins===1&&bo3.w2Wins===1) ? 'opacity-30' : ''
                  }`} style={{background: m.winner ? (m.bo3decider?'#dcfce7':'#fef9e7') : '#f3f4f6'}}>
                    <span className="font-bold text-gray-500">M{i+1}</span>
                    {m.winner ? (
                      <span className="font-semibold" style={{color: m.bo3decider?'#16a34a':'#C9A227'}}>
                        → {m.winner===m.w1.id ? m.w1.name : m.w2.name}
                      </span>
                    ) : (
                      <span className="text-gray-400">
                        {m.bo3decider && !(bo3.w1Wins===1&&bo3.w2Wins===1) ? 'locked' : 'pending'}
                      </span>
                    )}
                  </div>
                ) : null)}
              </div>
            )}

            {!is2 && total > 0 && (
              <div className="h-1.5" style={{background:'#e5e7eb'}}>
                <div className="h-1.5 transition-all" style={{width:pct+'%',background:'linear-gradient(to right,#C9A227,#A8841E)'}}/>
              </div>
            )}

            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs uppercase tracking-wide" style={{background:'#f9fafb',color:'#6b7280'}}>
                  <th className="text-left px-4 py-2">Place</th>
                  <th className="text-left px-4 py-2">Wrestler</th>
                  <th className="text-left px-4 py-2 hidden sm:table-cell">Level</th>
                  <th className="text-center px-3 py-2 text-green-600">{is2?'Series W':'W'}</th>
                  <th className="text-center px-3 py-2 text-red-500">{is2?'Series L':'L'}</th>
                  <th className="text-center px-3 py-2 cp-gold-text">Pins</th>
                  <th className="text-center px-3 py-2" style={{color:'#111'}}>Pts</th>
                </tr>
              </thead>
              <tbody>
                {standings.map((s,i) => {
                  const seriesW = is2&&bo3 ? (s.wrestler.id===bo3.w1Id?bo3.w1Wins:bo3.w2Wins) : null;
                  const seriesL = is2&&bo3 ? (s.wrestler.id===bo3.w1Id?bo3.w2Wins:bo3.w1Wins) : null;
                  return (
                    <tr key={s.wrestler.id} className="border-t transition-colors"
                      style={{borderColor:'#f3f4f6',background:i===0&&finished?'#fefce8':'transparent'}}>
                      <td className="px-4 py-3 text-lg text-center w-14">{ICONS[i]||`${i+1}.`}</td>
                      <td className="px-4 py-3 font-semibold text-gray-900">{s.wrestler.name}</td>
                      <td className="px-4 py-3 hidden sm:table-cell">
                        <div className="flex items-center gap-2">
                          <Badge text={s.wrestler.experience}/>
                          <span className="text-xs" style={{color:'#9ca3af'}}>{s.wrestler.weight}lbs · Age {s.wrestler.age}</span>
                        </div>
                      </td>
                      <td className="px-3 py-3 text-center font-bold text-green-700">{is2?seriesW:s.wins}</td>
                      <td className="px-3 py-3 text-center text-red-400">{is2?seriesL:s.losses}</td>
                      <td className="px-3 py-3 text-center font-bold cp-gold-text">{s.pins}</td>
                      <td className="px-3 py-3 text-center font-bold text-xl" style={{color:'#111'}}>{s.points}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

/* SCHEDULE */
function ScheduleView({ matches }) {
  if (!matches.length) return <Empty message="Schedule not generated yet." />;
  const rounds = [...new Set(matches.map(m => m.round))].sort((a,b) => a-b);
  const mats   = [...new Set(matches.map(m => m.mat))].sort((a,b) => a-b);
  const schedCountable = countableMatches(matches);
  const done   = schedCountable.filter(m => m.winner).length;
  const pct    = schedCountable.length ? Math.round(done/schedCountable.length*100) : 0;
  const winLabel = m => {
    if (!m.winner) return null;
    const name = m.winner===m.w1.id?m.w1.name:m.w2.name;
    return `${name} — ${m.winType==='pin'?'Pin (6pts)':'Points (4pts)'}`;
  };
  return (
    <div>
      <div className="bg-white rounded-2xl shadow p-4 mb-6">
        <div className="flex items-center justify-between mb-2 text-sm">
          <span className="font-semibold text-gray-700">Tournament Progress</span>
          <span className="font-bold cp-gold-text">{done} / {schedCountable.length} matches · {pct}%</span>
        </div>
        <div className="h-3 rounded-full overflow-hidden" style={{background:'#e5e7eb'}}>
          <div className="h-3 rounded-full transition-all" style={{width:pct+'%',background:'linear-gradient(to right,#C9A227,#A8841E)'}}/>
        </div>
      </div>
      {rounds.map(round => (
        <div key={round} className="mb-7">
          <div className="flex items-center gap-3 mb-3">
            <h2 className="font-bold text-lg text-white px-4 py-1.5 rounded-full" style={{background:'#111'}}>Round {round}</h2>
            <span className="text-sm" style={{color:'#9ca3af'}}>
              {matches.filter(m=>m.round===round&&m.winner).length} / {matches.filter(m=>m.round===round).length} done
            </span>
          </div>
          <div className={`grid gap-4 ${mats.length>1?'md:grid-cols-2':'grid-cols-1'}`}>
            {mats.map(mat => {
              const mm = matches.filter(m => m.round===round && m.mat===mat);
              if (!mm.length) return null;
              return (
                <div key={mat} className="bg-white rounded-2xl shadow p-4">
                  <div className="mb-3 flex items-center gap-2">
                    <span className="text-white font-bold px-3 py-1 rounded-lg text-sm" style={{background:'#111'}}>Mat {mat}</span>
                    <span className="text-xs" style={{color:'#9ca3af'}}>{mm.filter(m=>m.winner).length}/{mm.length} done</span>
                  </div>
                  <div className="space-y-2">
                    {mm.map(m => {
                      const bo3 = m.bo3 ? getBO3State(m.groupId, matches) : null;
                      const isSkipped = m.bo3decider && bo3 && bo3.seriesOver && !m.winner;
                      const isLocked  = m.bo3decider && bo3 && !(bo3.m1?.winner && bo3.m2?.winner && bo3.w1Wins===1 && bo3.w2Wins===1) && !m.winner && !isSkipped;
                      return (
                        <div key={m.id} className="px-3 py-2.5 rounded-xl text-sm"
                          style={{background: isSkipped?'#f9fafb': isLocked?'#f9fafb': m.winner?'#fefce8':'#f9fafb',
                                  border: isLocked||isSkipped?'1px dashed #e5e7eb':'none',
                                  opacity: isLocked||isSkipped ? 0.6 : 1}}>
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-bold px-2 py-0.5 rounded-full shrink-0" style={{background:'#C9A227',color:'#111'}}>{m.groupLabel}</span>
                            {m.bo3 && (
                              <span className="text-xs px-1.5 py-0.5 rounded-full shrink-0" style={{background: m.bo3decider?'#dcfce7':'#f3f4f6', color: m.bo3decider?'#166534':'#9ca3af', fontSize:'.6rem', fontWeight:700}}>
                                {isSkipped ? 'M3 — Not needed' : isLocked ? 'M3 — Locked' : m.bo3decider ? '🏆 M3 — Tiebreaker' : `M${m.round}`}
                              </span>
                            )}
                            {!isSkipped && !isLocked && <>
                              <span className={`font-medium flex-1 truncate ${m.winner===m.w1.id?'text-green-700':'text-gray-900'}`}>{m.w1.name}</span>
                              <span className="font-bold text-xs shrink-0" style={{color:'#d1d5db'}}>VS</span>
                              <span className={`font-medium flex-1 text-right truncate ${m.winner===m.w2.id?'text-green-700':'text-gray-900'}`}>{m.w2.name}</span>
                              {m.winner?<span className="text-green-500 shrink-0">✓</span>:<span className="text-xs shrink-0" style={{color:'#ccc'}}>—</span>}
                            </>}
                          </div>
                          {m.winner && <div className="text-xs mt-1.5 pl-1 font-medium cp-gold-text">🏆 {winLabel(m)}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ROOT */
function App() {
  const [page, setPage]               = useState('now');
  const [groups, setGroups]           = useState([]);
  const [matches, setMatches]         = useState([]);
  const [lastUpdated, setLastUpdated] = useState('Connecting...');

  useEffect(() => {
    // Real-time listener — updates instantly when admin enters results
    const ref = db.ref('clubpaw');
    ref.on('value', snap => {
      const d = snap.val() || {};
      setGroups(d.groups || []);
      setMatches(d.matches || []);
      const now = new Date();
      setLastUpdated(now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }));
    });
    return () => ref.off('value'); // cleanup on unmount
  }, []);

  return (
    <div className="min-h-screen" style={{background:'#f3f4f6'}}>
      <Nav page={page} setPage={setPage} lastUpdated={lastUpdated} />
      <div className="text-center text-xs py-1.5 font-semibold tracking-wide" style={{background:'#C9A227',color:'#111'}}>
        👁 VIEW ONLY — Updates in real-time
      </div>
      <div className="max-w-7xl mx-auto px-4 py-6 pb-12">
        {page==='now'       && <NowWrestlingView matches={matches} />}
        {page==='standings' && <StandingsView    groups={groups} matches={matches} />}
        {page==='schedule'  && <ScheduleView     matches={matches} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
