<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Paw — Tournament Viewer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--gold:#C9A227;--gold-dk:#A8841E;--black:#111111;}
    body{background:#f3f4f6;}
    .cp-nav{background:var(--black);}
    .cp-dark{background:var(--black);color:#fff;}
    .cp-gold{background:var(--gold);color:var(--black);}
    .cp-gold-text{color:var(--gold);}
    .cp-nav-active{background:var(--gold);color:var(--black)!important;font-weight:700;}
    .cp-nav-inactive{color:#d4b483;}
    .cp-nav-inactive:hover{background:#222;}
    .badge-b{background:#d1fae5;color:#065f46;}
    .badge-i{background:#fef3c7;color:#92400e;}
    .badge-a{background:#fee2e2;color:#991b1b;}
    .pulse{animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── LOCAL STORAGE (read-only, same keys as main app) ── */
const load = (k, fb) => {
  try { const s = localStorage.getItem('cp_' + k); return s ? JSON.parse(s) : fb; }
  catch(_) { return fb; }
};

/* ── STANDINGS ── */
function computeStandings(group, matches) {
  const rows = group.wrestlers.map(w => ({ wrestler: w, wins: 0, losses: 0, pins: 0, points: 0 }));
  matches.filter(m => m.groupId === group.id && m.winner).forEach(m => {
    const loserId = m.winner === m.w1.id ? m.w2.id : m.w1.id;
    const win = rows.find(r => r.wrestler.id === m.winner);
    const los = rows.find(r => r.wrestler.id === loserId);
    if (win) { win.wins++; win.points += m.winType === 'pin' ? 6 : 4; if (m.winType === 'pin') win.pins++; }
    if (los) los.losses++;
  });
  rows.sort((a, b) => b.points - a.points || b.wins - a.wins || b.pins - a.pins);
  return rows;
}

/* ── BADGE ── */
function Badge({ text }) {
  const cls = text === 'Beginner' ? 'badge-b' : text === 'Intermediate' ? 'badge-i' : 'badge-a';
  return <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${cls}`}>{text ? text[0] : '?'}</span>;
}

/* ── NAV ── */
function Nav({ page, setPage, lastUpdated }) {
  const tabs = [
    { id: 'standings', label: '🏆 Standings' },
    { id: 'schedule',  label: '📋 Schedule'  },
  ];
  return (
    <nav className="cp-nav shadow-xl sticky top-0 z-50">
      <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <div className="flex items-center gap-3">
          <div className="font-bold cp-gold-text text-base tracking-widest">🐾 CLUB PAW</div>
          <span className="text-gray-500 text-xs hidden sm:block">Tournament Viewer</span>
        </div>
        <div className="flex items-center gap-1">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setPage(t.id)}
              className={`px-3 py-1.5 rounded-lg text-sm transition-all ${page === t.id ? 'cp-nav-active' : 'cp-nav-inactive'}`}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-2 text-xs text-gray-500">
          <span className="pulse" style={{color:'#C9A227'}}>●</span>
          <span>Live · {lastUpdated}</span>
        </div>
      </div>
    </nav>
  );
}

/* ── EMPTY STATE ── */
function Empty({ message }) {
  return (
    <div className="bg-white rounded-2xl shadow p-12 text-center text-gray-400 max-w-md mx-auto mt-8">
      <div className="text-5xl mb-4">🐾</div>
      <p className="font-medium">{message}</p>
      <p className="text-xs mt-2 text-gray-300">Data will appear here once the tournament director sets up the brackets.</p>
    </div>
  );
}

/* ── STANDINGS PAGE ── */
function StandingsView({ groups, matches }) {
  const ICONS = ['🥇', '🥈', '🥉', '4th'];

  if (!groups.length) return <Empty message="No groups created yet." />;

  return (
    <div className="space-y-6">
      {groups.map(group => {
        const standings   = computeStandings(group, matches);
        const gm          = matches.filter(m => m.groupId === group.id);
        const total       = gm.length;
        const completed   = gm.filter(m => m.winner).length;
        const finished    = total > 0 && completed === total;
        const pct         = total ? Math.round(completed / total * 100) : 0;
        const is2         = group.wrestlers.length === 2;

        return (
          <div key={group.id} className="bg-white rounded-2xl shadow overflow-hidden">
            {/* Header */}
            <div className="cp-dark px-5 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="font-bold text-xl">Group {group.label}</span>
                {is2 && <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:'#C9A227',color:'#111'}}>2-person</span>}
              </div>
              <div className="flex items-center gap-3">
                <span className="text-sm" style={{color:'#C9A227'}}>{completed}/{total} matches</span>
                {finished && <span className="bg-green-500 text-white text-xs px-2 py-0.5 rounded-full font-semibold">FINAL</span>}
              </div>
            </div>

            {/* Progress bar */}
            {total > 0 && (
              <div className="h-2 bg-gray-100">
                <div className="h-2 transition-all" style={{width: pct + '%', background: 'linear-gradient(to right,#C9A227,#A8841E)'}} />
              </div>
            )}

            {/* Standings table */}
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wide">
                  <th className="text-left px-4 py-2">Place</th>
                  <th className="text-left px-4 py-2">Wrestler</th>
                  <th className="text-left px-4 py-2 hidden sm:table-cell">Level</th>
                  <th className="text-center px-3 py-2 text-green-700">W</th>
                  <th className="text-center px-3 py-2 text-red-400">L</th>
                  <th className="text-center px-3 py-2" style={{color:'#C9A227'}}>Pins</th>
                  <th className="text-center px-3 py-2" style={{color:'#111'}}>Pts</th>
                </tr>
              </thead>
              <tbody>
                {standings.map((s, i) => (
                  <tr key={s.wrestler.id}
                    className={`border-t transition-colors ${i === 0 && finished ? 'bg-yellow-50' : ''}`}>
                    <td className="px-4 py-3 text-lg text-center w-14">{ICONS[i] || `${i+1}.`}</td>
                    <td className="px-4 py-3 font-semibold">{s.wrestler.name}</td>
                    <td className="px-4 py-3 hidden sm:table-cell">
                      <div className="flex items-center gap-2">
                        <Badge text={s.wrestler.experience} />
                        <span className="text-gray-400 text-xs">{s.wrestler.weight}lbs · Age {s.wrestler.age}</span>
                      </div>
                    </td>
                    <td className="px-3 py-3 text-center font-bold text-green-700">{s.wins}</td>
                    <td className="px-3 py-3 text-center text-red-400">{s.losses}</td>
                    <td className="px-3 py-3 text-center font-bold" style={{color:'#C9A227'}}>{s.pins}</td>
                    <td className="px-3 py-3 text-center font-bold text-xl" style={{color:'#111'}}>{s.points}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

/* ── SCHEDULE PAGE ── */
function ScheduleView({ matches, groups }) {
  if (!matches.length) return <Empty message="Schedule not generated yet." />;

  const rounds = [...new Set(matches.map(m => m.round))].sort((a, b) => a - b);
  const mats   = [...new Set(matches.map(m => m.mat))].sort((a, b) => a - b);
  const done   = matches.filter(m => m.winner).length;
  const pct    = Math.round(done / matches.length * 100);

  const winLabel = m => {
    if (!m.winner) return null;
    const name = m.winner === m.w1.id ? m.w1.name : m.w2.name;
    return `${name} — ${m.winType === 'pin' ? 'Pin (6pts)' : 'Points (4pts)'}`;
  };

  return (
    <div>
      {/* Overall progress */}
      <div className="bg-white rounded-2xl shadow p-4 mb-6">
        <div className="flex items-center justify-between mb-2 text-sm">
          <span className="font-semibold" style={{color:'#111'}}>Tournament Progress</span>
          <span className="font-bold" style={{color:'#C9A227'}}>{done} / {matches.length} matches · {pct}%</span>
        </div>
        <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
          <div className="h-3 rounded-full transition-all" style={{width: pct + '%', background: 'linear-gradient(to right,#C9A227,#A8841E)'}} />
        </div>
      </div>

      {rounds.map(round => (
        <div key={round} className="mb-7">
          <div className="flex items-center gap-3 mb-3">
            <h2 className="font-bold text-lg text-white px-4 py-1.5 rounded-full" style={{background:'#111'}}>
              Round {round}
            </h2>
            <span className="text-sm text-gray-400">
              {matches.filter(m => m.round === round && m.winner).length} / {matches.filter(m => m.round === round).length} done
            </span>
          </div>

          <div className={`grid gap-4 ${mats.length > 1 ? 'md:grid-cols-2' : 'grid-cols-1'}`}>
            {mats.map(mat => {
              const mm = matches.filter(m => m.round === round && m.mat === mat);
              if (!mm.length) return null;
              return (
                <div key={mat} className="bg-white rounded-2xl shadow p-4">
                  <div className="mb-3 flex items-center gap-2">
                    <span className="text-white font-bold px-3 py-1 rounded-lg text-sm" style={{background:'#111'}}>Mat {mat}</span>
                    <span className="text-xs text-gray-400">{mm.filter(m=>m.winner).length}/{mm.length} done</span>
                  </div>
                  <div className="space-y-2">
                    {mm.map(m => (
                      <div key={m.id} className={`px-3 py-3 rounded-xl text-sm ${m.winner ? 'bg-yellow-50' : 'bg-gray-50'}`}>
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-bold px-2 py-0.5 rounded-full shrink-0" style={{background:'#C9A227',color:'#111'}}>
                            {m.groupLabel}
                          </span>
                          <span className={`font-medium flex-1 truncate ${m.winner === m.w1.id ? 'text-green-700' : ''}`}>
                            {m.w1.name}
                          </span>
                          <span className="text-gray-300 font-bold text-xs shrink-0">VS</span>
                          <span className={`font-medium flex-1 text-right truncate ${m.winner === m.w2.id ? 'text-green-700' : ''}`}>
                            {m.w2.name}
                          </span>
                          {m.winner
                            ? <span className="text-green-500 shrink-0">✓</span>
                            : <span className="text-gray-300 text-xs shrink-0">—</span>
                          }
                        </div>
                        {m.winner && (
                          <div className="text-xs mt-1.5 pl-1 font-medium" style={{color:'#A8841E'}}>
                            🏆 {winLabel(m)}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── ROOT ── */
function App() {
  const [page, setPage]           = useState('standings');
  const [groups, setGroups]       = useState([]);
  const [matches, setMatches]     = useState([]);
  const [lastUpdated, setLastUpdated] = useState('--:--');

  function refresh() {
    setGroups(load('groups', []));
    setMatches(load('matches', []));
    const now = new Date();
    setLastUpdated(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
  }

  // Load on mount, then auto-refresh every 15 seconds
  useEffect(() => {
    refresh();
    const interval = setInterval(refresh, 15000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="min-h-screen" style={{background:'#f3f4f6'}}>
      <Nav page={page} setPage={setPage} lastUpdated={lastUpdated} />

      {/* Read-only banner */}
      <div className="text-center text-xs py-2 font-medium" style={{background:'#C9A227',color:'#111'}}>
        👁 View Only — Auto-refreshes every 15 seconds
      </div>

      <div className="max-w-5xl mx-auto px-4 py-6 pb-12">
        {page === 'standings' && <StandingsView groups={groups} matches={matches} />}
        {page === 'schedule'  && <ScheduleView  groups={groups} matches={matches} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
